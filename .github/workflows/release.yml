name: Release Build

on:
  push:
    tags:
      - 'v*' # Trigger on version tags

jobs:
  build-desktop:
    name: Build Desktop App (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        platform: [windows, macos]
        include:
          - platform: windows
            os: windows-latest
            suffix: x86_64-pc-windows-msvc.exe
            exec_name: poster-resize-backend.exe
            target_path: frontend/src-tauri/binaries/poster-resize-backend-x86_64-pc-windows-msvc.exe
            out_file: dist/windows/PosterResizePro-Windows.exe
          - platform: macos
            os: macos-latest
            suffix: x86_64-apple-darwin
            exec_name: poster-resize-backend
            target_path: frontend/src-tauri/binaries/poster-resize-backend-x86_64-apple-darwin
            out_file: dist/macos/PosterResizePro-macOS.dmg

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build Python Sidecar Backend
        run: |
          python -m PyInstaller --onefile --noconsole --name poster-resize-backend --workpath build --distpath dist_backend backend/main.py

      - name: Stage Sidecar Binary
        run: |
          mkdir -p frontend/src-tauri/binaries
          if [ "${{ matrix.platform }}" = "macos" ]; then
            cp dist_backend/${{ matrix.exec_name }} frontend/src-tauri/binaries/poster-resize-backend-x86_64-apple-darwin
            cp dist_backend/${{ matrix.exec_name }} frontend/src-tauri/binaries/poster-resize-backend-aarch64-apple-darwin
          else
            cp dist_backend/${{ matrix.exec_name }} ${{ matrix.target_path }}
          fi
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Frontend & Tauri App
        run: |
          cd frontend
          npm install
          npm run build
          npm run tauri build

      - name: Organize Artifacts (Windows)
        if: matrix.platform == 'windows'
        run: |
          mkdir -p dist/windows
          cp frontend/src-tauri/target/release/bundle/nsis/*.exe dist/windows/PosterResizePro-Windows.exe
        shell: bash

      - name: Organize Artifacts (macOS)
        if: matrix.platform == 'macos'
        run: |
          mkdir -p dist/macos
          cp frontend/src-tauri/target/release/bundle/dmg/*.dmg dist/macos/PosterResizePro-macOS.dmg
        shell: bash

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: poster-resize-pro-${{ matrix.platform }}
          path: dist/

  build-android:
    name: Build Android App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install Tauri Android Targets
        run: |
          cargo install cargo-apk

      - name: Compile Android APK
        run: |
          cd frontend
          npm install
          # Initialize android config if missing
          npx tauri android init
          npx tauri android build --apk

      - name: Stage Android APK
        run: |
          mkdir -p dist/android
          built_apk=$(find frontend/src-tauri/gen/android/app/build/outputs/apk -name '*.apk' -type f | head -n 1)
          cp "$built_apk" dist/android/PosterResizePro-Android.apk

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: poster-resize-pro-android
          path: dist/

  publish-release:
    name: Publish Github Release
    needs: [build-desktop, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows/PosterResizePro-Windows.exe
            artifacts/macos/PosterResizePro-macOS.dmg
            artifacts/android/PosterResizePro-Android.apk
          name: Poster Resize Pro ${{ github.ref_name }}
          body: |
            ## Poster Resize Pro - Release ${{ github.ref_name }}
            
            Welcome to the official release of **Poster Resize Pro**, a print-ready poster processing tool.
            
            ### Package Manifests
            - **Windows (Portable)**: `PosterResizePro-Windows.exe`
            - **macOS (Intel/Apple Silicon)**: `PosterResizePro-macOS.dmg`
            - **Android (Lightweight)**: `PosterResizePro-Android.apk`
            
            ### Key Features
            - Scanline white-border removal
            - High-fidelity Real-ESRGAN 4x upscaling (desktop only)
            - GFPGAN identity-preserving face restoration (desktop only)
            - Adaptive aspect-ratio smart cropping & blurred background outpaint filling
            - 300 DPI target rendering
            - Unified ZIP output exporter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
